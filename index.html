<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
/>
<meta name="theme-color" content="#0a0705" />
<meta
  name="description"
  content="POPEYES-IFY — make memes with Popeyes, the cat on Solana."
/>
<title>POPEYES-IFY · the cat on Solana</title>
<link rel="stylesheet" href="style.css" />
<link
  rel="icon"
  href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%98%BC%3C/text%3E%3C/svg%3E"
/>

<main class="shrine">
  <header class="hdr">
    <h1 class="logo" aria-label="Popeyes">
      <span class="logo__pop">POPEYES</span>
    </h1>
    <p class="tagline">THE CUTEST PUSSY ON <span class="sol">SOLANA</span></p>
  </header>

  <!-- Contract address bar -->
  <div class="cabar">
    <span class="cabar__lbl">CA</span>
    <button class="cabar__addr" id="caCopy" type="button" aria-label="Copy contract address">
      <span class="cabar__mono">swA5DdNU2HC9Uab2SEeJ3etuDRz8LvVDPWCgRc3pump</span>
      <span class="cabar__copy" aria-hidden="true">⧉</span>
    </button>
    <a
      class="cabar__pump"
      href="https://pump.fun/coin/swA5DdNU2HC9Uab2SEeJ3etuDRz8LvVDPWCgRc3pump"
      target="_blank"
      rel="noopener noreferrer"
    >pump.fun ↗</a>
  </div>

  <!-- The single export canvas -->
  <section class="stage" id="stage">
    <div class="stage__glowframe" aria-hidden="true"></div>
    <canvas id="board" class="board" width="1000" height="1000"></canvas>
    <p class="stage__hint" id="hint">drag photo to reposition · pinch to zoom · tap a sticker to select</p>
  </section>

  <!-- Crop shape + export size -->
  <section class="panel panel--segs" aria-label="crop and size">
    <div class="seg" role="group" aria-label="crop shape">
      <button class="segbtn seg--on" data-shape="square" type="button">▢ Square</button>
      <button class="segbtn" data-shape="circle" type="button">◯ Circle</button>
    </div>
    <div class="seg" role="group" aria-label="export size">
      <button class="segbtn" data-size="400" type="button">400</button>
      <button class="segbtn" data-size="800" type="button">800</button>
      <button class="segbtn seg--on" data-size="2048" type="button">Max</button>
    </div>
  </section>

  <!-- Source picker -->
  <section class="panel" aria-label="pick a photo">
    <div
      class="drop"
      id="drop"
      role="button"
      tabindex="0"
      aria-label="Upload or drop a photo"
    >
      <span class="drop__icon">📷</span>
      <span class="drop__t">drop a photo</span>
      <span class="drop__s">tap to upload · jpg / png</span>
      <input id="file" type="file" accept="image/*" hidden />
    </div>
    <button class="btn btn--preset" id="preset" type="button">
      😼 use Popeyes
    </button>
  </section>

  <!-- Ribbon caption toggle -->
  <section class="panel panel--row" aria-label="caption">
    <span class="lbl">caption</span>
    <button class="switch" id="ribbonToggle" type="button" aria-pressed="false">
      <span class="switch__txt" id="ribbonTxt">POPEYES</span>
      <span class="switch__flip">↺</span>
    </button>
  </section>

  <!-- Sticker tray (categorized) -->
  <section class="tray" aria-label="sticker tray">
    <div class="tray__tabs" id="trayTabs"></div>
    <div class="tray__strip" id="trayStrip"></div>
  </section>

  <!-- Sticker actions -->
  <section class="panel panel--wrap" aria-label="sticker actions">
    <button class="chip" id="toggleEyes" type="button">👀 pop eyes</button>
    <button class="chip" id="addSparkle" type="button">✨ sparkle</button>
    <button class="chip" id="addPaw" type="button">🐾 paw</button>
    <button class="chip" id="flipSel" type="button">⇆ flip</button>
    <button class="chip" id="dupSel" type="button">⧉ duplicate</button>
    <button class="chip" id="delSel" type="button">✕ remove</button>
  </section>

  <!-- Layer order + history -->
  <section class="panel panel--wrap" aria-label="layers and history">
    <button class="chip" id="layerBack" type="button">⤓ to back</button>
    <button class="chip" id="layerBackward" type="button">↓ back</button>
    <button class="chip" id="layerForward" type="button">↑ forward</button>
    <button class="chip" id="layerFront" type="button">⤒ to front</button>
    <button class="chip" id="undo" type="button" disabled>↶ undo</button>
    <button class="chip" id="redo" type="button" disabled>↷ redo</button>
    <button class="chip" id="reset" type="button">↺ reset</button>
  </section>

  <!-- Live Flex — stamp live on-chain stats into the export -->
  <section class="panel panel--row" aria-label="live flex stats">
    <span class="lbl">live flex</span>
    <button
      class="switch flex-switch"
      id="flexToggle"
      type="button"
      aria-pressed="false"
      aria-label="Toggle live on-chain stats overlay"
    >
      <span class="switch__txt" id="flexTxt">stats: OFF</span>
      <span class="switch__flip" aria-hidden="true">◍</span>
    </button>
  </section>
  <p class="flex__note" id="flexNote" role="status" aria-live="polite"></p>

  <!-- Export + share -->
  <section class="panel">
    <button class="btn btn--dl" id="download" type="button">⬇ DOWNLOAD PNG</button>
    <div class="share">
      <button class="btn btn--share" id="copyImg" type="button">⧉ Copy image</button>
      <button class="btn btn--share" id="shareX" type="button">𝕏 Share to X</button>
    </div>
  </section>

  <footer class="ftr">not financial advice · just a cat</footer>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
